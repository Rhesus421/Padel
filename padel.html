<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Américano Padel — Vendredi</title>
<style>
  :root {
    --green: #1a7a4a;
    --green-light: #e8f5ee;
    --green-mid: #2ea76a;
    --yellow: #f5c842;
    --dark: #111;
    --gray: #666;
    --border: #ddd;
    --rest-bg: #fafafa;
    --white: #fff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background: #f0f4f1;
    color: var(--dark);
    min-height: 100vh;
  }
  header {
    background: var(--green);
    color: white;
    padding: 18px 16px 14px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  header h1 { font-size: 1.3rem; font-weight: 800; letter-spacing: 0.5px; }
  header p { font-size: 0.78rem; opacity: 0.85; margin-top: 2px; }

  .tabs {
    display: flex;
    background: var(--white);
    border-bottom: 2px solid var(--border);
    position: sticky;
    top: 62px;
    z-index: 99;
  }
  .tab {
    flex: 1;
    padding: 11px 4px;
    text-align: center;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--gray);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
  }
  .tab.active { color: var(--green); border-bottom-color: var(--green); }

  .view { display: none; padding: 12px; }
  .view.active { display: block; }

  /* ROUNDS VIEW */
  .round-card {
    background: white;
    border-radius: 12px;
    margin-bottom: 14px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .round-header {
    background: var(--green);
    color: white;
    padding: 10px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .round-header span { font-size: 0.9rem; font-weight: 700; }
  .round-header .round-status { font-size: 0.72rem; opacity: 0.8; }
  .round-header.done { background: #555; }
  .round-header.current { background: var(--green-mid); }

  .courts-row { display: flex; gap: 0; }
  .court-block {
    flex: 1;
    padding: 10px 12px;
    border-right: 1px solid var(--border);
  }
  .court-block:last-child { border-right: none; }
  .court-label {
    font-size: 0.65rem;
    font-weight: 700;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .team {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
  }
  .team-color {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .team-a .team-color { background: var(--green); }
  .team-b .team-color { background: var(--yellow); }
  .team-names { font-size: 0.82rem; font-weight: 600; }
  .vs-row {
    text-align: center;
    font-size: 0.65rem;
    color: var(--gray);
    font-weight: 700;
    margin: 2px 0;
    letter-spacing: 1px;
  }
  .score-inputs { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
  .score-input {
    width: 44px; height: 36px;
    border: 2px solid var(--border);
    border-radius: 8px;
    text-align: center;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--dark);
    background: var(--rest-bg);
    -moz-appearance: textfield;
  }
  .score-input:focus { outline: none; border-color: var(--green); background: white; }
  .score-input::-webkit-outer-spin-button,
  .score-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .score-sep { font-size: 0.9rem; color: var(--gray); font-weight: 700; }

  .rest-block {
    padding: 8px 14px;
    background: var(--rest-bg);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .rest-label { font-size: 0.65rem; color: var(--gray); font-weight: 700; text-transform: uppercase; }
  .rest-names { font-size: 0.8rem; color: var(--gray); }

  .save-btn {
    width: 100%;
    padding: 11px;
    background: var(--green);
    color: white;
    border: none;
    font-size: 0.88rem;
    font-weight: 700;
    cursor: pointer;
    border-top: 1px solid rgba(0,0,0,0.1);
    transition: background 0.15s;
  }
  .save-btn:active { background: #155c38; }
  .save-btn.saved { background: #555; }

  /* SCORES VIEW */
  .scores-table-wrap { overflow-x: auto; background: white; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  table { width: 100%; border-collapse: collapse; }
  th { background: var(--green); color: white; padding: 10px 8px; font-size: 0.75rem; text-align: center; }
  th:first-child { text-align: left; padding-left: 12px; }
  td { padding: 9px 8px; font-size: 0.82rem; text-align: center; border-bottom: 1px solid var(--border); }
  td:first-child { text-align: left; padding-left: 12px; font-weight: 600; }
  tr:last-child td { border-bottom: none; }
  tr:nth-child(even) td { background: #fafafa; }
  tr:nth-child(even) td:first-child { background: #fafafa; }
  .rank-1 td:first-child { color: var(--green); }
  .rank-8 td:first-child { color: var(--yellow); border-bottom: 2px dashed var(--yellow); }
  .qualified { background: var(--green-light) !important; }
  .legend { font-size: 0.72rem; color: var(--gray); margin: 10px 12px; }

  /* BRACKET VIEW */
  .bracket-section { margin-bottom: 16px; }
  .bracket-title {
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--gray);
    margin-bottom: 8px;
    padding-left: 4px;
  }
  .match-card {
    background: white;
    border-radius: 10px;
    margin-bottom: 8px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .match-card .match-label {
    background: var(--green);
    color: white;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 5px 10px;
    display: flex;
    justify-content: space-between;
  }
  .match-card .match-label.semi { background: #e67e22; }
  .match-card .match-label.final { background: #c0392b; }
  .match-card .match-label.third { background: #7f8c8d; }
  .bracket-team {
    display: flex;
    align-items: center;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    gap: 10px;
  }
  .bracket-team:last-child { border-bottom: none; }
  .bracket-seed {
    width: 22px; height: 22px;
    background: var(--green-light);
    color: var(--green);
    border-radius: 50%;
    font-size: 0.7rem;
    font-weight: 800;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .bracket-team-name { font-size: 0.85rem; font-weight: 600; flex: 1; }
  .bracket-score-input {
    width: 38px; height: 32px;
    border: 2px solid var(--border);
    border-radius: 6px;
    text-align: center;
    font-size: 1rem;
    font-weight: 700;
    -moz-appearance: textfield;
  }
  .bracket-score-input:focus { outline: none; border-color: var(--green); }
  .bracket-score-input::-webkit-outer-spin-button,
  .bracket-score-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .bracket-note { font-size: 0.7rem; color: var(--gray); padding: 6px 12px; background: var(--rest-bg); border-top: 1px solid var(--border); }
</style>
</head>
<body>

<header>
  <h1>🎾 Américano Padel</h1>
  <p>12 joueurs · 2 terrains · 12 tours · Matchs en 12 pts</p>
</header>

<div class="tabs">
  <div class="tab active" onclick="showTab('rounds')">Matchs</div>
  <div class="tab" onclick="showTab('scores')">Classement</div>
  <div class="tab" onclick="showTab('bracket')">Tableau Final</div>
</div>

<div id="view-rounds" class="view active"></div>
<div id="view-scores" class="view">
  <div class="scores-table-wrap">
    <table id="scores-table">
      <thead>
        <tr>
          <th>#</th><th>Joueur</th><th>Matchs</th><th>Pts</th><th>Moy</th>
        </tr>
      </thead>
      <tbody id="scores-body"></tbody>
    </table>
  </div>
  <p class="legend">🟢 Top 8 qualifiés pour le tableau final</p>
</div>

<div id="view-bracket" class="view">
  <div id="bracket-content"></div>
</div>

<script>
const PLAYERS = ['Rémi','Coco','JS','Lulu','Julien','Dorian','Olivier','Maxime','Joris','Gus','Pierre Luc','JB'];

// 16 rounds, 2 courts (4 teams of 2), 4 resting each round
// Optimized manually to maximize partner/opponent variety
// Format: [ [court1_teamA, court1_teamB], [court2_teamA, court2_teamB], [rest] ]
// Players indexed 0-11 matching PLAYERS array
const ROUNDS = [
  // Round 1
  { c1: [[0,1],[2,3]], c2: [[4,5],[6,7]], rest: [8,9,10,11] },
  // Round 2
  { c1: [[8,9],[10,11]], c2: [[0,2],[4,6]], rest: [1,3,5,7] },
  // Round 3
  { c1: [[1,3],[5,7]], c2: [[8,10],[9,11]], rest: [0,2,4,6] },
  // Round 4
  { c1: [[0,4],[1,5]], c2: [[2,8],[3,9]], rest: [6,7,10,11] },
  // Round 5
  { c1: [[6,10],[7,11]], c2: [[0,8],[1,9]], rest: [2,3,4,5] },
  // Round 6
  { c1: [[2,6],[3,7]], c2: [[4,10],[5,11]], rest: [0,1,8,9] },
  // Round 7
  { c1: [[0,6],[2,4]], c2: [[1,11],[3,10]], rest: [5,7,8,9] },
  // Round 8
  { c1: [[5,8],[7,9]], c2: [[0,10],[2,11]], rest: [1,3,4,6] },
  // Round 9
  { c1: [[1,4],[3,6]], c2: [[5,9],[7,10]], rest: [0,2,8,11] },
  // Round 10
  { c1: [[0,3],[1,7]], c2: [[4,11],[6,8]], rest: [2,5,9,10] },
  // Round 11
  { c1: [[2,9],[5,10]], c2: [[0,7],[3,11]], rest: [1,4,6,8] },
  // Round 12
  { c1: [[1,6],[4,8]], c2: [[2,10],[3,5]], rest: [0,7,9,11] },
  // Round 13
  { c1: [[5,6],[9,0]], c2: [[2,1],[8,11]], rest: [10,4,3,7] },
  // Round 14
  { c1: [[8,3],[4,7]], c2: [[1,10],[6,9]], rest: [0,2,5,11] },
  // Round 15
  { c1: [[3,4],[0,11]], c2: [[7,8],[5,2]], rest: [10,6,9,1] },
  // Round 16
  { c1: [[1,8],[11,6]], c2: [[9,10],[4,2]], rest: [3,7,5,0] },
];

// State
let scores = {}; // key: "r{round}_c{court}" -> {a: pts, b: pts}
let playerTotals = {}; // player index -> {pts, matches}
PLAYERS.forEach((_, i) => { playerTotals[i] = {pts: 0, matches: 0}; });

// Load from localStorage if available
try {
  const saved = localStorage.getItem('padel_americano_scores');
  if (saved) {
    const data = JSON.parse(saved);
    scores = data.scores || {};
    playerTotals = data.playerTotals || playerTotals;
  }
} catch(e) {}

function saveState() {
  try {
    localStorage.setItem('padel_americano_scores', JSON.stringify({ scores, playerTotals }));
  } catch(e) {}
}

function recalcTotals() {
  PLAYERS.forEach((_, i) => { playerTotals[i] = {pts: 0, matches: 0}; });
  ROUNDS.forEach((round, ri) => {
    ['c1','c2'].forEach((courtKey, ci) => {
      const key = `r${ri}_c${ci}`;
      const sc = scores[key];
      if (sc && (sc.a !== '' || sc.b !== '')) {
        const a = parseInt(sc.a) || 0;
        const b = parseInt(sc.b) || 0;
        const court = round[courtKey];
        court[0].forEach(pi => { playerTotals[pi].pts += a; playerTotals[pi].matches++; });
        court[1].forEach(pi => { playerTotals[pi].pts += b; playerTotals[pi].matches++; });
      }
    });
  });
}

function pName(i) { return PLAYERS[i]; }
function pNames(arr) { return arr.map(pName).join(' / '); }

function renderRounds() {
  const container = document.getElementById('view-rounds');
  container.innerHTML = '';
  ROUNDS.forEach((round, ri) => {
    const card = document.createElement('div');
    card.className = 'round-card';

    const sc1 = scores[`r${ri}_c0`];
    const sc2 = scores[`r${ri}_c1`];
    const done = sc1 && sc2 && sc1.a !== undefined && sc1.a !== '' && sc1.b !== undefined && sc1.b !== '' && sc2.a !== undefined && sc2.a !== '' && sc2.b !== undefined && sc2.b !== '';

    card.innerHTML = `
      <div class="round-header ${done ? 'done' : ''}">
        <span>Tour ${ri+1}</span>
        <span class="round-status">${done ? '✅ Terminé' : '⏳ En attente'}</span>
      </div>
      <div class="courts-row">
        ${renderCourt(round.c1, ri, 0)}
        ${renderCourt(round.c2, ri, 1)}
      </div>
      <div class="rest-block">
        <span class="rest-label">Repos :</span>
        <span class="rest-names">${round.rest.map(pName).join(', ')}</span>
      </div>
      <button class="save-btn" onclick="saveRound(${ri})" style="${done ? 'background:#2ea76a;' : ''}">
        ${done ? '✏️ Modifier les scores' : '💾 Enregistrer les scores'}
      </button>
    `;
    container.appendChild(card);
  });
}

function renderCourt(court, ri, ci) {
  const key = `r${ri}_c${ci}`;
  const sc = scores[key] || {a:'', b:''};
  return `
    <div class="court-block">
      <div class="court-label">Terrain ${ci+1}</div>
      <div class="team team-a">
        <div class="team-color"></div>
        <div class="team-names">${pNames(court[0])}</div>
      </div>
      <div class="vs-row">VS</div>
      <div class="team team-b">
        <div class="team-color"></div>
        <div class="team-names">${pNames(court[1])}</div>
      </div>
      <div class="score-inputs">
        <input type="number" class="score-input" id="sc_${ri}_${ci}_a" value="${sc.a}" min="0" max="12" placeholder="—">
        <span class="score-sep">–</span>
        <input type="number" class="score-input" id="sc_${ri}_${ci}_b" value="${sc.b}" min="0" max="12" placeholder="—">
      </div>
    </div>`;
}

function saveRound(ri) {
  [0,1].forEach((ci) => {
    const a = document.getElementById(`sc_${ri}_${ci}_a`)?.value;
    const b = document.getElementById(`sc_${ri}_${ci}_b`)?.value;
    if (a !== '' || b !== '') {
      scores[`r${ri}_c${ci}`] = {a, b};
    }
  });
  recalcTotals();
  saveState();
  renderRounds();
  renderScores();
  renderBracket();
}

function renderScores() {
  const tbody = document.getElementById('scores-body');
  const sorted = PLAYERS.map((name, i) => ({
    name, i,
    pts: playerTotals[i].pts,
    matches: playerTotals[i].matches,
    avg: playerTotals[i].matches > 0 ? (playerTotals[i].pts / playerTotals[i].matches).toFixed(1) : '–'
  })).sort((a,b) => b.pts - a.pts || b.matches - a.matches);

  tbody.innerHTML = sorted.map((p, rank) => `
    <tr class="${rank < 8 ? 'qualified' : ''}">
      <td>${rank+1}</td>
      <td>${p.name}</td>
      <td>${p.matches}</td>
      <td><strong>${p.pts}</strong></td>
      <td>${p.avg}</td>
    </tr>
  `).join('');
}

// Bracket state
let drawDone = false;
let drawnTeams = [];
let semiBracket = [ {a:'', b:''}, {a:'', b:''} ];
let finalBracket = {a:'', b:'', c:'', d:''};

function doDrawAndRender() {
  const sorted = PLAYERS.map((name, i) => ({
    name, pts: playerTotals[i].pts, matches: playerTotals[i].matches,
  })).sort((a,b) => b.pts - a.pts);
  const q = sorted.slice(0, 8).map(p => p.name);
  const shuffled = [...q].sort(() => Math.random() - 0.5);
  drawnTeams = [
    [shuffled[0], shuffled[1]],
    [shuffled[2], shuffled[3]],
    [shuffled[4], shuffled[5]],
    [shuffled[6], shuffled[7]],
  ];
  drawDone = true;
  semiBracket = [ {a:'', b:''}, {a:'', b:''} ];
  finalBracket = {a:'', b:'', c:'', d:''};
  saveBracketState();
  renderBracket();
}

function saveBracketState() {
  try { localStorage.setItem('padel_bracket', JSON.stringify({ drawDone, drawnTeams, semiBracket, finalBracket })); } catch(e) {}
}

function loadBracketState() {
  try {
    const saved = localStorage.getItem('padel_bracket');
    if (saved) {
      const d = JSON.parse(saved);
      drawDone = d.drawDone || false;
      drawnTeams = d.drawnTeams || [];
      semiBracket = d.semiBracket || [ {a:'', b:''}, {a:'', b:''} ];
      finalBracket = d.finalBracket || {a:'', b:'', c:'', d:''};
    }
  } catch(e) {}
}

function teamLabel(pair) { return pair ? pair.join(' / ') : '?'; }

function renderBracket() {
  const container = document.getElementById('bracket-content');
  const sorted = PLAYERS.map((name, i) => ({
    name, i,
    pts: playerTotals[i].pts,
    matches: playerTotals[i].matches,
  })).sort((a,b) => b.pts - a.pts);

  const q = sorted.slice(0, 8);

  let html = '';

  // Qualified list + draw button
  html += `<div class="bracket-section">
    <div class="bracket-title">🎯 8 Qualifiés</div>
    <div class="round-card">
      <div style="padding:10px 12px;">
        ${q.map((p,i) => `
          <div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:${i<7?'1px solid var(--border)':'none'}">
            <div class="bracket-seed">${i+1}</div>
            <div style="font-size:0.88rem;font-weight:600">${p.name}</div>
            <div style="margin-left:auto;font-size:0.78rem;color:var(--gray)">${p.pts} pts</div>
          </div>`).join('')}
      </div>
      <button class="save-btn" onclick="doDrawAndRender()" style="background:var(--yellow);color:#111;">
        🎲 ${drawDone ? 'Refaire le tirage au sort' : 'Lancer le tirage au sort'}
      </button>
    </div>
  </div>`;

  if (!drawDone) { container.innerHTML = html; return; }

  // Demi-finales
  html += `<div class="bracket-section">
    <div class="bracket-title">🔥 Demi-finales — Équipes tirées au sort</div>
    ${[0,1].map(si => {
      const teamA = drawnTeams[si];
      const teamB = drawnTeams[si + 2];
      const sc = semiBracket[si];
      return `<div class="match-card">
        <div class="match-label semi">DF${si+1} — Terrain ${si+1}</div>
        <div style="padding:8px 12px;font-size:0.82rem;font-weight:600;background:#fef9e7;">${teamLabel(teamA)}</div>
        <div style="display:flex;gap:8px;align-items:center;padding:8px 12px;">
          <input type="number" class="bracket-score-input" id="sf_${si}_a" value="${sc.a}" min="0" max="12" placeholder="–"
            oninput="semiBracket[${si}].a=this.value;saveBracketState();renderBracket()">
          <span style="font-size:0.9rem;color:var(--gray);font-weight:700">–</span>
          <input type="number" class="bracket-score-input" id="sf_${si}_b" value="${sc.b}" min="0" max="12" placeholder="–"
            oninput="semiBracket[${si}].b=this.value;saveBracketState();renderBracket()">
        </div>
        <div style="padding:8px 12px;font-size:0.82rem;font-weight:600;background:#fef9e7;border-top:1px solid var(--border)">${teamLabel(teamB)}</div>
        <div class="bracket-note">Match en 12 points · score équipe du haut – score équipe du bas</div>
      </div>`;
    }).join('')}
  </div>`;

  // Compute finalists
  const sf0a = parseInt(semiBracket[0].a)||0, sf0b = parseInt(semiBracket[0].b)||0;
  const sf1a = parseInt(semiBracket[1].a)||0, sf1b = parseInt(semiBracket[1].b)||0;
  const semi0done = semiBracket[0].a !== '' && semiBracket[0].b !== '';
  const semi1done = semiBracket[1].a !== '' && semiBracket[1].b !== '';
  const finalistA = semi0done ? (sf0a >= sf0b ? teamLabel(drawnTeams[0]) : teamLabel(drawnTeams[2])) : 'Vainqueur DF1';
  const finalistB = semi1done ? (sf1a >= sf1b ? teamLabel(drawnTeams[1]) : teamLabel(drawnTeams[3])) : 'Vainqueur DF2';
  const thirdA    = semi0done ? (sf0a <  sf0b ? teamLabel(drawnTeams[0]) : teamLabel(drawnTeams[2])) : 'Perdant DF1';
  const thirdB    = semi1done ? (sf1a <  sf1b ? teamLabel(drawnTeams[1]) : teamLabel(drawnTeams[3])) : 'Perdant DF2';

  // Petite finale
  html += `<div class="bracket-section">
    <div class="bracket-title">🥉 Petite Finale — 3e place</div>
    <div class="match-card">
      <div class="match-label third">Terrain 1</div>
      <div style="padding:8px 12px;font-size:0.82rem;font-weight:600;background:#f8f9fa;">${thirdA}</div>
      <div style="display:flex;gap:8px;align-items:center;padding:8px 12px;">
        <input type="number" class="bracket-score-input" value="${finalBracket.c||''}" min="0" max="12" placeholder="–"
          oninput="finalBracket.c=this.value;saveBracketState();renderBracket()">
        <span style="font-size:0.9rem;color:var(--gray);font-weight:700">–</span>
        <input type="number" class="bracket-score-input" value="${finalBracket.d||''}" min="0" max="12" placeholder="–"
          oninput="finalBracket.d=this.value;saveBracketState();renderBracket()">
      </div>
      <div style="padding:8px 12px;font-size:0.82rem;font-weight:600;background:#f8f9fa;border-top:1px solid var(--border)">${thirdB}</div>
    </div>
  </div>`;

  // Finale
  const finalDone = finalBracket.a !== '' && finalBracket.b !== '';
  const winner = finalDone ? (parseInt(finalBracket.a)||0 >= parseInt(finalBracket.b)||0 ? finalistA : finalistB) : null;
  html += `<div class="bracket-section">
    <div class="bracket-title">🥇 FINALE</div>
    <div class="match-card">
      <div class="match-label final">Terrain 2 — LA GRANDE FINALE</div>
      <div style="padding:8px 12px;font-size:0.82rem;font-weight:600;background:#d4edda;">${finalistA}</div>
      <div style="display:flex;gap:8px;align-items:center;padding:8px 12px;">
        <input type="number" class="bracket-score-input" value="${finalBracket.a||''}" min="0" max="12" placeholder="–"
          oninput="finalBracket.a=this.value;saveBracketState();renderBracket()">
        <span style="font-size:0.9rem;color:var(--gray);font-weight:700">–</span>
        <input type="number" class="bracket-score-input" value="${finalBracket.b||''}" min="0" max="12" placeholder="–"
          oninput="finalBracket.b=this.value;saveBracketState();renderBracket()">
      </div>
      <div style="padding:8px 12px;font-size:0.82rem;font-weight:600;background:#d4edda;border-top:1px solid var(--border)">${finalistB}</div>
      ${winner ? `<div style="background:#155724;color:white;text-align:center;padding:12px;font-weight:800;font-size:1rem;">🏆 Vainqueurs : ${winner}</div>` : ''}
    </div>
  </div>`;

  container.innerHTML = html;
}

function showTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    const tabs = ['rounds','scores','bracket'];
    t.classList.toggle('active', tabs[i] === tab);
  });
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(`view-${tab}`).classList.add('active');
}

// Init
recalcTotals();
loadBracketState();
renderRounds();
renderScores();
renderBracket();
</script>
</body>
</html>
